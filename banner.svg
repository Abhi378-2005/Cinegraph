<svg width="800" height="160" viewBox="0 0 800 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Shimmer gradient that sweeps left to right across the title -->
    <linearGradient id="shimmer" gradientUnits="userSpaceOnUse" x1="-400" y1="0" x2="0" y2="0">
      <stop offset="0%"   stop-color="#5b21b6"/>
      <stop offset="35%"  stop-color="#7c3aed"/>
      <stop offset="50%"  stop-color="#ede9fe"/>
      <stop offset="65%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
      <animate attributeName="x1" values="-400;800"  dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;1200"    dur="2.8s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Soft glow behind the title text -->
    <filter id="glow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Pulse animation for the graph nodes -->
    <radialGradient id="nodePulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── Left decorative graph ───────────────────────────────── -->
  <line x1="38"  y1="28"  x2="108" y2="68"  stroke="#7c3aed" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="108" y1="68"  x2="52"  y2="122" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="38"  y1="28"  x2="52"  y2="122" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.15"/>
  <line x1="108" y1="68"  x2="148" y2="108" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.2"/>

  <circle cx="38"  cy="28"  r="4.5" fill="#7c3aed" fill-opacity="0.55"/>
  <circle cx="108" cy="68"  r="3.5" fill="#a78bfa" fill-opacity="0.6"/>
  <circle cx="52"  cy="122" r="4"   fill="#7c3aed" fill-opacity="0.45"/>
  <circle cx="148" cy="108" r="3"   fill="#a78bfa" fill-opacity="0.4"/>

  <!-- Pulse ring on centre-left node -->
  <circle cx="108" cy="68" r="10" fill="url(#nodePulse)">
    <animate attributeName="r"        values="6;14;6"    dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity"  values="0.5;0;0.5" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- ── Right decorative graph ──────────────────────────────── -->
  <line x1="762" y1="28"  x2="692" y2="68"  stroke="#7c3aed" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="692" y1="68"  x2="748" y2="122" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="762" y1="28"  x2="748" y2="122" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.15"/>
  <line x1="692" y1="68"  x2="652" y2="108" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.2"/>

  <circle cx="762" cy="28"  r="4.5" fill="#7c3aed" fill-opacity="0.55"/>
  <circle cx="692" cy="68"  r="3.5" fill="#a78bfa" fill-opacity="0.6"/>
  <circle cx="748" cy="122" r="4"   fill="#7c3aed" fill-opacity="0.45"/>
  <circle cx="652" cy="108" r="3"   fill="#a78bfa" fill-opacity="0.4"/>

  <!-- Pulse ring on centre-right node -->
  <circle cx="692" cy="68" r="10" fill="url(#nodePulse)">
    <animate attributeName="r"        values="6;14;6"    dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity"  values="0.5;0;0.5" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- ── Title ───────────────────────────────────────────────── -->
  <text
    x="400" y="104"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="80"
    font-weight="800"
    text-anchor="middle"
    letter-spacing="-2"
    fill="url(#shimmer)"
    filter="url(#glow)">CineGraph</text>

  <!-- ── Tagline ─────────────────────────────────────────────── -->
  <text
    x="400" y="138"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="12"
    font-weight="400"
    text-anchor="middle"
    letter-spacing="5"
    fill="#8b5cf6"
    fill-opacity="0.6">WATCH ALGORITHMS DISCOVER WHAT YOU'LL LOVE NEXT</text>
</svg>
