# Production compose for VM deployment.
# Images are loaded from tarballs — no build context needed.
# Run from ~/CineGraph/ alongside backend.env, frontend.env, and gcp-service-account.json.

services:
  backend:
    image: cinegraph-backend
    container_name: cinegraph-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./backend.env
    volumes:
      # Mount GCP service account key read-only into the container
      - ./gcp-service-account.json:/app/secrets/gcp-service-account.json:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: cinegraph-frontend
    container_name: cinegraph-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./frontend.env
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
